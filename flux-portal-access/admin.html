<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux | Admin Portal</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0a0a0a] text-[#ededed] font-sans selection:bg-[#3ecf8e] selection:text-black">

    <div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
            <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-[#3ecf8e]/5 blur-[120px] rounded-full"></div>
            <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-indigo-500/5 blur-[120px] rounded-full"></div>
        </div>

        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#111111] border border-[#3e3e3e] mb-4 shadow-2xl">
                    <i data-lucide="shield-check" class="text-[#3ecf8e] w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tighter text-white">Flux <span class="text-[#3ecf8e]">Admin</span></h1>
                <p class="text-[#a0a0a0] text-sm mt-2">Internal Security Operations Portal</p>
            </div>

            <div class="bg-[#111111] border border-[#3e3e3e] rounded-2xl p-8 shadow-2xl shadow-black">
                <form class="space-y-6">
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-[#a0a0a0] uppercase tracking-widest ml-1">Admin Identity</label>
                        <div class="relative group">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#555555] group-focus-within:text-[#3ecf8e] transition-colors w-4 h-4"></i>
                            <input 
                                type="email" 
                                placeholder="admin@flux.security" 
                                class="w-full bg-[#0a0a0a] border border-[#3e3e3e] rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-[#3ecf8e] focus:ring-1 focus:ring-[#3ecf8e]/20 transition-all placeholder:text-[#333]"
                            >
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-end px-1">
                            <label class="text-[10px] font-bold text-[#a0a0a0] uppercase tracking-widest">Secret Key</label>
                            <a href="#" class="text-[10px] text-[#555555] hover:text-[#3ecf8e] transition-colors">Forgot Access?</a>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#555555] group-focus-within:text-[#3ecf8e] transition-colors w-4 h-4"></i>
                            <input 
                                type="password" 
                                placeholder="••••••••" 
                                class="w-full bg-[#0a0a0a] border border-[#3e3e3e] rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-[#3ecf8e] focus:ring-1 focus:ring-[#3ecf8e]/20 transition-all placeholder:text-[#333]"
                            >
                        </div>
                    </div>

                    <div class="flex items-start gap-3 p-3 bg-indigo-500/5 border border-indigo-500/20 rounded-lg">
                        <i data-lucide="info" class="text-indigo-400 w-4 h-4 shrink-0 mt-0.5"></i>
                        <p class="text-[10px] text-indigo-300/80 leading-relaxed">
                            MFA is mandatory for all administrative accounts. You will be prompted for your TOTP code in the next step.
                        </p>
                    </div>

                    <button class="w-full bg-[#3ecf8e] text-black font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(62,207,142,0.2)]">
                        Initialize Access
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>

            <div class="mt-8 flex justify-center gap-6 text-[11px] text-[#555555] font-medium uppercase tracking-wider">
                <a href="#" class="hover:text-[#ededed] transition-colors">Status: <span class="text-[#3ecf8e]">Optimal</span></a>
                <span class="text-[#222]">|</span>
                <a href="#" class="hover:text-[#ededed] transition-colors">System Logs</a>
                <span class="text-[#222]">|</span>
                <a href="#" class="hover:text-[#ededed] transition-colors">Privacy</a>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
